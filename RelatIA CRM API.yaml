        Body:
        {
            "contact_id": "uuid",
            "from_pipeline_id": "uuid",
            "to_pipeline_id": "uuid",
            "to_stage_id": "uuid",
            "move_type": "all|newest|oldest|specific",
            "deal_id": "uuid"  // Required only when move_type="specific"
        }

        Move Types:
        - "all": Move all open deals
        - "newest": Move only the most recent deal
        - "oldest": Move only the oldest deal
        - "specific": Move a specific deal (requires deal_id)
