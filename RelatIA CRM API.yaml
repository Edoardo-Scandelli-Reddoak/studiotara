openapi: 3.0.3
info:
  title: RelatIA CRM API
  version: 1.0.0
  description: API Multi-Tenant per RelatIA CRM. Include gestione contatti, pipeline,
    deal e integrazioni.
paths:
  /api/activity-feed/:
    get:
      operationId: activity_feed_retrieve
      description: GET /api/activity-feed/ — Recent activity across entities.
      tags:
      - activity-feed
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api-info/:
    get:
      operationId: api_info_retrieve
      description: |-
        Endpoint per ottenere informazioni sull'integrazione API
        Non richiede autenticazione
      tags:
      - api-info
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/api/appointment-outcomes/:
    get:
      operationId: api_appointment_outcomes_retrieve
      description: |-
        GET /crm/api/appointment-outcomes/

        Ritorna la lista degli esiti disponibili con sotto-esiti.
        Usato dal frontend per popolare il form di registrazione esito.
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/appointments/{appointment_id}/history/:
    get:
      operationId: api_appointments_history_retrieve
      description: |-
        GET /api/appointments/<appointment_id>/history/

        Ritorna il log cronologico completo di modifiche di stato per
        un appuntamento: creazione, cambi di outcome, reschedule,
        cambio commerciale, sincronizzazione Google Calendar.

        Risposta:
        {
          "appointment_id": "...",
          "events": [
            {
              "id": "...",
              "change_type": "cancelled",
              "change_type_label": "Annullato",
              "old_outcome": "scheduled",
              "new_outcome": "cancelled",
              "old_scheduled_at": null,
              "new_scheduled_at": null,
              "old_sales_rep": {"id": "...", "email": "..."},
              "new_sales_rep": {"id": "...", "email": "..."},
              "old_outcome_result": {"id": "...", "label": "..."},
              "new_outcome_result": {...},
              "linked_new_appointment": {"id": "...", "scheduled_at": "..."},
              "changed_by": {"id": "...", "email": "...", "full_name": "..."},
              "source": "ui",
              "source_label": "Interfaccia web",
              "reason": "...",
              "google_sync_status": "success",
              "google_sync_error": "",
              "changed_at": "2026-01-01T12:00:00Z"
            },
            ...
          ]
        }
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/appointments/{appointment_id}/record-outcome/:
    post:
      operationId: api_appointments_record_outcome_create
      description: |-
        POST /api/appointments/{appointment_id}/record-outcome/

        Registra l'esito di un appuntamento con possibilità di:
        - Cambiare lo stato dell'appuntamento (outcome)
        - Aggiungere note della riunione
        - Spostare il deal collegato a un nuovo stage
        - Creare un nuovo appuntamento di follow-up

        Body:
        {
            "outcome": "completed",           # required: scheduled|completed|no_show|cancelled|rescheduled
            "meeting_notes": "...",           # optional
            "move_deal_to_stage": "uuid",     # optional: sposta il deal a questo stage
            "new_appointment": {              # optional: crea follow-up
                "scheduled_at": "ISO datetime",
                "appointment_type": "video",
                "duration_minutes": 30,
                "include_self": true,
                "invite_client": false,
                "additional_attendee_id": null
            }
        }

        Response:
        - 200 OK con dati aggiornati
        - 400 Bad Request se validazione fallisce
        - 403 Forbidden se utente non autorizzato
        - 404 Not Found se appuntamento non esiste
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/appointments/team-members/:
    get:
      operationId: api_appointments_team_members_retrieve
      description: |-
        GET /api/appointments/team-members/

        Ritorna la lista dei membri del team disponibili per gli appuntamenti.
        Usato per popolare il dropdown "Aggiungi altro membro del team".

        IMPORTANTE: Filtra gli utenti per il tenant corrente tramite TenantMembership.
        Gli utenti sono globali ma l'accesso ai tenant è controllato dalla membership.

        Response:
        [
            {"id": "uuid", "email": "...", "full_name": "..."},
            ...
        ]
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/deals/{deal_id}/appointment-info/:
    get:
      operationId: api_deals_appointment_info_retrieve
      description: |-
        GET /api/deals/{deal_id}/appointment-info/

        Ritorna le informazioni del deal necessarie per il form di prenotazione.
        Ottimizzato per popolare velocemente il pannello quick-book.

        Response:
        {
            "deal": {
                "id": "uuid",
                "name": "Deal Name",
                "value": 25000,
                "stage": "Qualification",
                "pipeline": "B2B Sales"
            },
            "contact": {
                "id": "uuid",
                "full_name": "Mario Rossi",
                "email": "mario@example.com",
                "phone": "+39 123456789",
                "company": "ACME Inc"
            },
            "assigned_to": {
                "id": "uuid",
                "email": "sales@example.com",
                "full_name": "Sales Rep"
            },
            "upcoming_appointments": [
                {
                    "id": "uuid",
                    "scheduled_at": "2025-01-20T10:00:00",
                    "appointment_type": "video",
                    "outcome": "scheduled"
                }
            ],
            "team_members": [
                {"id": "uuid", "email": "...", "full_name": "..."}
            ]
        }
      parameters:
      - in: path
        name: deal_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/deals/{deal_id}/book-appointment/:
    post:
      operationId: api_deals_book_appointment_create
      description: |-
        POST /api/deals/{deal_id}/book-appointment/

        Crea un nuovo appuntamento direttamente da un deal nella pipeline board.
        Endpoint ottimizzato per UX veloce con supporto completo per inviti.

        Body:
        {
            "scheduled_at": "2025-01-20T10:00:00",       # required: ISO datetime
            "appointment_type": "video",                 # required: call|video|in_person|demo
            "duration_minutes": 30,                      # optional, default 30
            "agenda": "Discussione proposta",            # optional: visibile al cliente
            "preparation_notes": "Note private",         # optional: solo CRM
            "invite_self": true,                         # optional: aggiungi al mio calendario
            "invite_client": true,                       # optional: invia invito al cliente
            "invite_colleague_id": "uuid",               # optional: invita collega
            "additional_emails": ["a@b.com"]             # optional: altre email da invitare
        }

        Response:
        {
            "success": true,
            "appointment": {
                "id": "uuid",
                "title": "Appuntamento - Mario Rossi",
                "scheduled_at": "2025-01-20T10:00:00",
                "appointment_type": "video",
                "duration_minutes": 30,
                "google_synced": true,
                "google_meet_link": "https://meet.google.com/xxx-yyy-zzz",
                "invitees": ["user@example.com", "client@example.com"]
            }
        }
      parameters:
      - in: path
        name: deal_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/deals/{deal_id}/notes/:
    get:
      operationId: api_deals_notes_retrieve
      description: Get all notes for a deal, ordered by most recent first
      parameters:
      - in: path
        name: deal_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: api_deals_notes_create
      description: Add a new note to a deal
      parameters:
      - in: path
        name: deal_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/login/:
    post:
      operationId: api_login_create
      description: JSON-based session login for the SPA frontend.
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/api/logout/:
    post:
      operationId: api_logout_create
      description: JSON-based session logout for the SPA frontend.
      tags:
      - api
      security:
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/api/team-availability/:
    get:
      operationId: api_team_availability_retrieve
      description: |-
        GET /crm/api/team-availability/

        Query params:
            start: ISO datetime inizio finestra (default: lunedì settimana corrente)
            end: ISO datetime fine finestra (default: start + 7 giorni)
            user_ids: lista comma-separated di user UUID (default: preferenza salvata,
                oppure tutti i membri del tenant con GCal collegato)

        Response:
        {
            "start": "...",
            "end": "...",
            "users": [
                {
                    "id": "uuid",
                    "email": "...",
                    "full_name": "...",
                    "connected": true,
                    "shares_titles": true,
                    "events": [
                        {
                            "id": "google_event_id",
                            "start": "ISO",
                            "end": "ISO",
                            "title": "...",   # vuoto se non condiviso
                            "all_day": false,
                            "visibility": "default",
                            "status": "confirmed"
                        }
                    ],
                    "error": null    # messaggio se fetch fallita
                }
            ]
        }
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/api/team-availability/preferences/:
    get:
      operationId: api_team_availability_preferences_retrieve
      description: |-
        GET/PUT /crm/api/team-availability/preferences/

        GET response:
        {
            "selected_user_ids": ["uuid1", "uuid2"],
            "share_event_titles": true
        }

        PUT body:
        {
            "selected_user_ids": ["uuid1", ...],    # opzionale
            "share_event_titles": true              # opzionale
        }
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_team_availability_preferences_update
      description: |-
        GET/PUT /crm/api/team-availability/preferences/

        GET response:
        {
            "selected_user_ids": ["uuid1", "uuid2"],
            "share_event_titles": true
        }

        PUT body:
        {
            "selected_user_ids": ["uuid1", ...],    # opzionale
            "share_event_titles": true              # opzionale
        }
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/:
    get:
      operationId: appointments_list
      parameters:
      - in: query
        name: appointment_type
        schema:
          type: string
          enum:
          - call
          - demo
          - in_person
          - video
        description: |-
          * `call` - Phone Call
          * `video` - Video Call
          * `in_person` - In Person
          * `demo` - Demo
      - in: query
        name: contact
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: organizer
        schema:
          type: integer
      - in: query
        name: outcome
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - no_show
          - rescheduled
          - scheduled
        description: |-
          * `scheduled` - Scheduled
          * `completed` - Completed
          * `no_show` - No Show
          * `cancelled` - Cancelled
          * `rescheduled` - Rescheduled
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: sales_rep
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: source
        schema:
          type: string
          enum:
          - api
          - google_calendar
          - import
          - manual
        description: |-
          Origine dell'appuntamento

          * `manual` - Manual Entry
          * `google_calendar` - Google Calendar
          * `api` - API
          * `import` - Import
      tags:
      - appointments
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentList'
          description: ''
    post:
      operationId: appointments_create
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/appointments/{id}/:
    get:
      operationId: appointments_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
    put:
      operationId: appointments_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
    patch:
      operationId: appointments_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAppointmentRequest'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
    delete:
      operationId: appointments_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/appointments/{id}/cancel/:
    post:
      operationId: appointments_cancel_create
      description: |-
        Soft-cancel: marks the appointment as cancelled and frees its slot
        on the calendar. The signal layer handles Google Calendar deletion,
        push notification, and audit log entry. Reversible via /restore/.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/appointments/{id}/complete/:
    post:
      operationId: appointments_complete_create
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/appointments/{id}/restore/:
    post:
      operationId: appointments_restore_create
      description: |-
        Reverts a cancelled appointment back to scheduled. The signal layer
        recreates the Google Calendar event if the original had one.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Appointment.
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/appointments/available_slots/:
    get:
      operationId: appointments_available_slots_retrieve
      tags:
      - appointments
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/call-system/active-pipelines/:
    get:
      operationId: call_system_active_pipelines_retrieve
      description: |-
        GET /api/call-system/active-pipelines/

        Ritorna la lista delle pipeline attive disponibili per il call system.

        Response:
        [
            {
                "id": "uuid",
                "name": "Sales Pipeline",
                "pipeline_type": "opportunity",
                "decay_enabled": true,
                "available_deals_count": 42
            },
            ...
        ]
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/extend-lock/:
    post:
      operationId: call_system_extend_lock_create
      description: |-
        POST /api/call-system/extend-lock/

        Estende il lock su un deal (heartbeat mechanism).

        Body:
        {
            "deal_id": "uuid",
            "additional_minutes": 5
        }

        Response:
        - 200 OK con nuova expires_at
        - 403 Forbidden se deal non lockato da questo utente
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/next-deal/:
    get:
      operationId: call_system_next_deal_retrieve
      description: |-
        GET /api/call-system/next-deal/?pipeline_id=<uuid>

        Ritorna il prossimo deal da chiamare per l'operatore.
        Priorità: 1) Callbacks scaduti 2) Deal nello stage principale (per score)

        Response:
        - 200 + DealDetailSerializer se c'è un deal disponibile
        - 204 No Content se non ci sono deal disponibili
        - 400 Bad Request se pipeline_id mancante o invalido
        - 423 Locked se il deal è già lockato da altro operatore
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/quick-outcomes/:
    get:
      operationId: call_system_quick_outcomes_retrieve
      description: |-
        GET /api/call-system/quick-outcomes/?pipeline_id=<uuid>

        Ritorna gli stage configurati come "quick outcomes" per una pipeline.
        Usato dal frontend per mostrare i pulsanti esito rapido.

        Response:
        [
            {
                "id": "uuid",
                "name": "Non risponde",
                "color": "#FFA500",
                "position": 2,
                "quick_outcome_callback_mode": "required",
                "quick_outcome_notes_mode": "optional",
                "score_adjustment": -10
            },
            ...
        ]
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/record-outcome/:
    post:
      operationId: call_system_record_outcome_create
      description: |-
        POST /api/call-system/record-outcome/

        Registra l'esito di una chiamata.

        Body:
        {
            "deal_id": "uuid",
            "stage_id": "uuid",
            "notes": "optional string",
            "callback_datetime": "optional ISO datetime"
        }

        Response:
        - 200 OK con deal aggiornato
        - 400 Bad Request se validazione fallisce
        - 403 Forbidden se deal non lockato da questo utente
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/release-lock/:
    post:
      operationId: call_system_release_lock_create
      description: |-
        POST /api/call-system/release-lock/

        Rilascia manualmente il lock su un deal.

        Body:
        {
            "deal_id": "uuid"
        }

        Response:
        - 200 OK
        - 403 Forbidden se deal non lockato da questo utente
      tags:
      - call-system
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/call-system/stats/:
    get:
      operationId: call_system_stats_retrieve
      description: |-
        GET /api/call-system/stats/?date=YYYY-MM-DD

        Ritorna statistiche chiamate per la data specificata (default: oggi).

        Response:
        {
            "calls_today": 42,
            "conversions_today": 15,
            "conversion_rate": 35.7,
            "date": "2025-01-15"
        }
      tags:
