      description: |-
        POST /api/appointments/{appointment_id}/record-outcome/

        Registra l'esito di un appuntamento con possibilità di:
        - Cambiare lo stato dell'appuntamento (outcome)
        - Aggiungere note della riunione
        - Spostare il deal collegato a un nuovo stage
        - Creare un nuovo appuntamento di follow-up

        Body:
        {
            "outcome": "completed",           # required: scheduled|completed|no_show|cancelled|rescheduled
            "meeting_notes": "...",           # optional
            "move_deal_to_stage": "uuid",     # optional: sposta il deal a questo stage
            "new_appointment": {              # optional: crea follow-up
                "scheduled_at": "ISO datetime",
                "appointment_type": "video",
                "duration_minutes": 30,
                "include_self": true,
                "invite_client": false,
                "additional_attendee_id": null
            }
        }

        Response:
        - 200 OK con dati aggiornati
        - 400 Bad Request se validazione fallisce
        - 403 Forbidden se utente non autorizzato
        - 404 Not Found se appuntamento non esiste
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - crm
      security:
      - tokenAuth: []
      responses:
        '200':
