components:
  schemas:
    ActionTypeEnum:
      enum:
      - webhook
      - email
      - both
      type: string
      description: |-
        * `webhook` - Send Webhook
        * `email` - Send Email
        * `both` - Webhook + Email
    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          readOnly: true
        custom_title:
          type: string
          description: Lascia vuoto per generare automaticamente
          maxLength: 200
        contact:
          allOf:
          - $ref: '#/components/schemas/AppointmentContact'
          readOnly: true
        sales_rep:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        sales_rep_name:
          type: string
          readOnly: true
        organizer:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        appointment_type:
          $ref: '#/components/schemas/AppointmentTypeEnum'
        appointment_type_display:
          type: string
          readOnly: true
        appointment_category:
          allOf:
          - $ref: '#/components/schemas/AppointmentCategoryEnum'
          description: |-
            Tipo di appuntamento nel sistema doppio

            * `single` - Singolo
            * `seller_private` - Privato Seller
            * `client_shared` - Condiviso Cliente
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          description: |-
            Origine dell'appuntamento

            * `manual` - Manual Entry
            * `google_calendar` - Google Calendar
            * `api` - API
            * `import` - Import
        source_display:
          type: string
          readOnly: true
        scheduled_at:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        location:
          type: string
          maxLength: 500
        outcome:
          $ref: '#/components/schemas/OutcomeEnum'
        outcome_display:
          type: string
          readOnly: true
        outcome_result:
          allOf:
          - $ref: '#/components/schemas/AppointmentOutcomeRead'
          readOnly: true
        sub_outcome:
          allOf:
          - $ref: '#/components/schemas/AppointmentOutcomeRead'
          readOnly: true
        agenda:
          type: string
        preparation_notes:
          type: string
        meeting_notes:
          type: string
        google_meet_link:
          type: string
          format: uri
          description: Link Google Meet generato automaticamente
          maxLength: 200
        google_calendar_synced:
          type: boolean
          readOnly: true
        deal_name:
          type: string
          readOnly: true
        deal_pipeline_id:
          type: string
          readOnly: true
        invitees:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentInvitee'
          readOnly: true
        cancellation_info:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - appointment_type_display
      - cancellation_info
      - contact
      - created_at
      - deal_name
      - deal_pipeline_id
      - google_calendar_synced
      - id
      - invitees
      - organizer
      - outcome_display
      - outcome_result
      - sales_rep
      - sales_rep_name
      - scheduled_at
      - source_display
      - sub_outcome
      - title
      - updated_at
    AppointmentCategoryEnum:
      enum:
      - single
      - seller_private
      - client_shared
      type: string
      description: |-
        * `single` - Singolo
        * `seller_private` - Privato Seller
        * `client_shared` - Condiviso Cliente
    AppointmentContact:
      type: object
      description: Lightweight contact serializer for appointment responses.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        company:
          type: string
          readOnly: true
      required:
      - company
      - email
      - first_name
      - full_name
      - id
      - last_name
      - phone
    AppointmentInvitee:
      type: object
      description: Serializer for appointment invitees
      properties:
        id:
          type: string
