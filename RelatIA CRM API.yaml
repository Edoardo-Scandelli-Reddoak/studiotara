        Authorization: Bearer YOUR_API_TOKEN

        Permette di aggiornare:
        - Qualsiasi campo del contatto (tutti opzionali)
        - Custom fields del contatto
        - Deal associati al contatto (stage, valore, status, etc.)

        Payload di esempio:
        {
            "phone": "+39 333 9999999",
            "city": "Roma",
            "lead_score": 85,
            "custom_values": [
                {
                    "custom_field": "uuid-del-custom-field",
                    "value_text": "Nuovo valore"
