        - ``POST   /{id}/options/``          salva ``import_options``
        - ``POST   /{id}/start/``            avvia il task Celery
        - ``POST   /{id}/cancel/``           revoca un job in processing
        - ``GET    /{id}/status/``           snapshot leggero per polling
        - ``GET    /{id}/errors/``           error_log paginato
        - ``GET    /{id}/errors/download/``  CSV degli errori
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
