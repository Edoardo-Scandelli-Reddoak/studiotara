        - ``POST   /``                       upload + crea il job (multipart)
        - ``GET    /``                       lista paginata storico import dell'utente
        - ``GET    /{id}/``                  stato completo del job
        - ``DELETE /{id}/``                  eliminazione (vietata se ``processing``)
